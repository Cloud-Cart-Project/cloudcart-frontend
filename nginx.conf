server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # AUTH
    location /auth/ {
        proxy_pass http://auth-service:8080/auth/;
    }

    location = /auth {
        proxy_pass http://auth-service:8080/auth;
    }

    # AUTH (legacy compatibility)
    location /api/auth/ {
        proxy_pass http://auth-service:8080/auth/;
    }

    location = /api/auth {
        proxy_pass http://auth-service:8080/auth;
    }

    # PRODUCTS
    location /api/products/ {
        proxy_pass http://vehicle-service:8080/products/;
    }

    location = /api/products {
        proxy_pass http://vehicle-service:8080/products;
    }

    # VEHICLES (FleetOps)
    location /api/vehicles/ {
        proxy_pass http://vehicle-service:8080/api/vehicles/;
    }

    location = /api/vehicles {
        proxy_pass http://vehicle-service:8080/api/vehicles;
    }

    # CART
    location /api/cart/ {
        proxy_pass http://maintenance-service:8080/cart/;
    }

    location = /api/cart {
        proxy_pass http://maintenance-service:8080/cart;
    }

    # TASKS (FleetOps maintenance queue)
    location /api/tasks/ {
        proxy_pass http://maintenance-service:8080/api/tasks/;
    }

    location = /api/tasks {
        proxy_pass http://maintenance-service:8080/api/tasks;
    }

    # REQUESTS (FleetOps)
    location /api/requests/ {
        proxy_pass http://request-service:8080/api/requests/;
    }

    location = /api/requests {
        proxy_pass http://request-service:8080/api/requests;
    }

    # ORDERS (legacy compatibility)
    location /api/orders/ {
        proxy_pass http://request-service:8080/orders/;
    }

    location = /api/orders {
        proxy_pass http://request-service:8080/orders;
    }

    # React SPA â€” serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

